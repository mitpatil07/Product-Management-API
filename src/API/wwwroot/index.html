<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Core — Enterprise Management Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #090d16;
            --bg-card: rgba(22, 30, 46, 0.75);
            --bg-card-hover: rgba(30, 41, 59, 0.85);
            --border-card: rgba(255, 255, 255, 0.08);
            --border-focus: #6366f1;
            
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.35);
            --accent: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --shadow-glow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-card);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-admin {
            background: rgba(236, 72, 153, 0.15);
            color: #f472b6;
            border: 1px solid rgba(236, 72, 153, 0.3);
        }

        .role-user {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-card);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        /* Container */
        .main-container {
            max-width: 1240px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
            flex: 1;
        }

        /* Auth Container */
        .auth-card {
            max-width: 440px;
            margin: 4rem auto;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-sub {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--border-focus);
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .auth-toggle {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .quick-accounts {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border-card);
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        /* Dashboard Overview */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            backdrop-filter: blur(12px);
        }

        .metric-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .metric-val {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .metric-lbl {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Controls bar */
        .controls-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 260px;
        }

        /* Product Cards Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            background: var(--bg-card-hover);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .product-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .product-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .items-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-card);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #111827;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 520px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }

        .modal-backdrop.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
        }

        /* Items List in Modal */
        .items-list {
            max-height: 240px;
            overflow-y: auto;
            margin: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-card);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 2000;
        }

        .toast {
            padding: 0.9rem 1.4rem;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        .toast-success { background: #059669; }
        .toast-error { background: #dc2626; }
        .toast-info { background: #2563eb; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav class="navbar">
        <div class="brand">
            <div class="brand-icon">P</div>
            <span>ProductCore</span>
        </div>
        <div class="user-nav" id="userNav">
            <!-- Dynamically populated -->
        </div>
    </nav>

    <!-- Main App Container -->
    <div class="main-container">

        <!-- AUTH VIEW (Login / Register) -->
        <div id="authView" class="auth-card hidden">
            <h2 class="auth-title" id="authTitle">Welcome Back</h2>
            <p class="auth-sub" id="authSub">Sign in to manage system products & inventory</p>

            <form id="authForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="authUsername" class="form-input" placeholder="e.g. admin" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="authPassword" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group hidden" id="roleGroup">
                    <label class="form-label">Role</label>
                    <select id="authRole" class="form-select">
                        <option value="Admin">Admin (Full Access)</option>
                        <option value="User">User (Standard Access)</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="authSubmitBtn">Sign In</button>
            </form>

            <div class="auth-toggle">
                <span id="authToggleText">Don't have an account?</span>
                <span class="auth-link" id="authToggleLink" onclick="toggleAuthMode()">Register Now</span>
            </div>

            <div class="quick-accounts">
                <button class="btn btn-secondary btn-sm" onclick="fillQuickAuth('admin', 'AdminPassword123!')">Fill Admin</button>
                <button class="btn btn-secondary btn-sm" onclick="fillQuickAuth('user', 'UserPassword123!')">Fill User</button>
            </div>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="dashboardView" class="hidden">
            
            <!-- Metrics Row -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon" style="background: rgba(99, 102, 241, 0.15); color: #818cf8;">📦</div>
                    <div>
                        <div class="metric-val" id="metricTotalProducts">0</div>
                        <div class="metric-lbl">Total Products</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon" style="background: rgba(236, 72, 153, 0.15); color: #f472b6;">🔢</div>
                    <div>
                        <div class="metric-val" id="metricTotalItems">0</div>
                        <div class="metric-lbl">Total Inventory Items</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon" style="background: rgba(16, 185, 129, 0.15); color: #34d399;">⚡</div>
                    <div>
                        <div class="metric-val" style="color: #34d399; font-size: 1.2rem;">Connected</div>
                        <div class="metric-lbl">REST API Status</div>
                    </div>
                </div>
            </div>

            <!-- Action & Search Bar -->
            <div class="controls-card">
                <div class="search-box">
                    <input type="text" id="searchInput" class="form-input" placeholder="🔍 Search products by name..." oninput="debounceSearch()">
                    <select id="sortSelect" class="form-select" style="max-width: 160px;" onchange="loadProducts()">
                        <option value="created_desc">Newest First</option>
                        <option value="name">Name (A-Z)</option>
                        <option value="name_desc">Name (Z-A)</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="openCreateProductModal()">+ Add New Product</button>
            </div>

            <!-- Products List -->
            <div id="productsGrid" class="products-grid">
                <!-- Dynamically rendered -->
            </div>

            <!-- Pagination -->
            <div class="pagination" id="paginationControls">
                <button class="btn btn-secondary btn-sm" id="prevPageBtn" onclick="changePage(-1)">← Previous</button>
                <span id="pageInfoText" style="font-size: 0.9rem; color: var(--text-muted);">Page 1</span>
                <button class="btn btn-secondary btn-sm" id="nextPageBtn" onclick="changePage(1)">Next →</button>
            </div>

        </div>

    </div>

    <!-- CREATE / EDIT PRODUCT MODAL -->
    <div class="modal-backdrop" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="productModalTitle">Add New Product</h3>
                <button class="modal-close" onclick="closeModal('productModal')">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label class="form-label">Product Name</label>
                    <input type="text" id="productNameInput" class="form-input" placeholder="e.g. Enterprise Laptop Pro" required>
                </div>
                <div style="display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MANAGE ITEMS MODAL -->
    <div class="modal-backdrop" id="itemsModal">
        <div class="modal" style="max-width: 580px;">
            <div class="modal-header">
                <div>
                    <h3 class="modal-title" id="itemsModalTitle">Product Items</h3>
                    <span style="font-size: 0.85rem; color: var(--text-muted);" id="itemsModalSubtitle"></span>
                </div>
                <button class="modal-close" onclick="closeModal('itemsModal')">&times;</button>
            </div>

            <!-- Add Item Form -->
            <form onsubmit="addItem(event)" style="display: flex; gap: 0.75rem; margin-bottom: 1.25rem;">
                <input type="hidden" id="activeProductId">
                <input type="number" id="newItemQuantity" class="form-input" placeholder="Quantity (e.g. 50)" min="1" required>
                <button type="submit" class="btn btn-primary" style="white-space: nowrap;">+ Add Quantity</button>
            </form>

            <div class="items-list" id="itemsList">
                <!-- Dynamically populated items -->
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // State
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('jwt_token') || null;
        let currentUser = JSON.parse(localStorage.getItem('user_info') || 'null');
        let isRegistering = false;
        
        let currentPage = 1;
        let pageSize = 6;
        let totalPages = 1;
        let searchTimeout = null;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            if (token && currentUser) {
                showDashboard();
            } else {
                showAuth();
            }
        });

        // Toast Helper
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // Auth Logic
        function toggleAuthMode() {
            isRegistering = !isRegistering;
            document.getElementById('authTitle').innerText = isRegistering ? 'Create Account' : 'Welcome Back';
            document.getElementById('authSub').innerText = isRegistering ? 'Register a new user or admin account' : 'Sign in to manage system products & inventory';
            document.getElementById('roleGroup').classList.toggle('hidden', !isRegistering);
            document.getElementById('authSubmitBtn').innerText = isRegistering ? 'Register' : 'Sign In';
            document.getElementById('authToggleText').innerText = isRegistering ? 'Already have an account?' : "Don't have an account?";
            document.getElementById('authToggleLink').innerText = isRegistering ? 'Sign In' : 'Register Now';
        }

        function fillQuickAuth(user, pass) {
            document.getElementById('authUsername').value = user;
            document.getElementById('authPassword').value = pass;
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const role = document.getElementById('authRole').value;

            const endpoint = isRegistering ? `${API_BASE}/auth/register` : `${API_BASE}/auth/login`;
            const payload = isRegistering ? { username, password, role } : { username, password };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();

                if (json.success && json.data) {
                    token = json.data.accessToken;
                    currentUser = { username: json.data.username, role: json.data.role };
                    localStorage.setItem('jwt_token', token);
                    localStorage.setItem('user_info', JSON.stringify(currentUser));
                    showToast(`Welcome ${currentUser.username}!`, 'success');
                    showDashboard();
                } else {
                    showToast(json.message || 'Authentication failed', 'error');
                }
            } catch (err) {
                showToast('Network error connecting to API', 'error');
            }
        });

        function logout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user_info');
            showToast('Logged out successfully', 'info');
            showAuth();
        }

        function showAuth() {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('userNav').innerHTML = `<a href="/swagger" target="_blank" class="btn btn-secondary btn-sm">Swagger Docs ↗</a>`;
        }

        function showDashboard() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');

            const roleClass = currentUser.role === 'Admin' ? 'role-admin' : 'role-user';
            document.getElementById('userNav').innerHTML = `
                <span class="role-badge ${roleClass}">${currentUser.role}</span>
                <span style="font-weight: 600; font-size: 0.9rem;">${currentUser.username}</span>
                <a href="/swagger" target="_blank" class="btn btn-secondary btn-sm">Swagger ↗</a>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
            `;

            loadProducts();
        }

        // Fetch API wrapper
        async function authFetch(url, options = {}) {
            options.headers = options.headers || {};
            options.headers['Authorization'] = `Bearer ${token}`;
            options.headers['Content-Type'] = 'application/json';

            const res = await fetch(url, options);
            if (res.status === 401) {
                logout();
                throw new Error('Session expired');
            }
            return await res.json();
        }

        // Products Logic
        async function loadProducts() {
            const search = document.getElementById('searchInput').value.trim();
            const sort = document.getElementById('sortSelect').value;

            try {
                const query = `pageNumber=${currentPage}&pageSize=${pageSize}&search=${encodeURIComponent(search)}&sort=${sort}`;
                const res = await authFetch(`${API_BASE}/products?${query}`);

                if (res.success && res.data) {
                    renderProducts(res.data.items);
                    totalPages = res.data.totalPages;
                    document.getElementById('pageInfoText').innerText = `Page ${res.data.pageNumber} of ${res.data.totalPages || 1}`;
                    document.getElementById('prevPageBtn').disabled = !res.data.hasPreviousPage;
                    document.getElementById('nextPageBtn').disabled = !res.data.hasNextPage;

                    document.getElementById('metricTotalProducts').innerText = res.data.totalCount;
                    
                    let totalItemsCount = 0;
                    res.data.items.forEach(p => totalItemsCount += p.items ? p.items.length : 0);
                    document.getElementById('metricTotalItems').innerText = totalItemsCount;
                }
            } catch (err) {
                showToast('Failed to load products', 'error');
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">No products found. Click "+ Add New Product" to create one.</div>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                const itemCount = p.items ? p.items.length : 0;
                const createdDate = new Date(p.createdOn).toLocaleDateString();
                const isAdmin = currentUser.role === 'Admin';

                return `
                    <div class="product-card">
                        <div>
                            <div class="product-header">
                                <span class="product-id">ID: #${p.id}</span>
                                <span class="items-badge">📦 ${itemCount} ${itemCount === 1 ? 'Item' : 'Items'}</span>
                            </div>
                            <h4 class="product-name">${escapeHtml(p.productName)}</h4>
                            <div class="product-meta">
                                <span>Created: ${createdDate}</span>
                            </div>
                        </div>

                        <div class="product-actions">
                            <button class="btn btn-secondary btn-sm" onclick="openItemsModal(${p.id}, '${escapeHtml(p.productName)}')">Manage Items</button>
                            <button class="btn btn-secondary btn-sm" onclick="openEditProductModal(${p.id}, '${escapeHtml(p.productName)}')">Edit</button>
                            ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                loadProducts();
            }, 300);
        }

        function changePage(delta) {
            currentPage += delta;
            loadProducts();
        }

        // Modal Helpers
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openCreateProductModal() {
            document.getElementById('editProductId').value = '';
            document.getElementById('productNameInput').value = '';
            document.getElementById('productModalTitle').innerText = 'Add New Product';
            document.getElementById('productModal').classList.add('active');
        }

        function openEditProductModal(id, name) {
            document.getElementById('editProductId').value = id;
            document.getElementById('productNameInput').value = name;
            document.getElementById('productModalTitle').innerText = 'Edit Product';
            document.getElementById('productModal').classList.add('active');
        }

        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('editProductId').value;
            const productName = document.getElementById('productNameInput').value.trim();

            try {
                let res;
                if (id) {
                    res = await authFetch(`${API_BASE}/products/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify(productName)
                    });
                } else {
                    res = await authFetch(`${API_BASE}/products`, {
                        method: 'POST',
                        body: JSON.stringify({ productName })
                    });
                }

                if (res.success) {
                    showToast(res.message || 'Product saved successfully', 'success');
                    closeModal('productModal');
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to save product', 'error');
                }
            } catch (err) {
                showToast('Error saving product', 'error');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const res = await authFetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                if (res.success) {
                    showToast('Product deleted successfully', 'success');
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to delete product', 'error');
                }
            } catch (err) {
                showToast('Error deleting product', 'error');
            }
        }

        // Child Items Logic
        async function openItemsModal(productId, productName) {
            document.getElementById('activeProductId').value = productId;
            document.getElementById('itemsModalTitle').innerText = productName;
            document.getElementById('itemsModalSubtitle').innerText = `Product ID #${productId}`;
            document.getElementById('itemsModal').classList.add('active');
            loadItems(productId);
        }

        async function loadItems(productId) {
            const list = document.getElementById('itemsList');
            list.innerHTML = `<div style="text-align: center; color: var(--text-muted);">Loading items...</div>`;

            try {
                const res = await authFetch(`${API_BASE}/products/${productId}/items`);
                if (res.success && res.data) {
                    renderItems(res.data);
                }
            } catch (err) {
                list.innerHTML = `<div style="color: var(--danger);">Failed to load items.</div>`;
            }
        }

        function renderItems(items) {
            const list = document.getElementById('itemsList');
            if (!items || items.length === 0) {
                list.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 1.5rem;">No inventory items attached yet.</div>`;
                return;
            }

            list.innerHTML = items.map(item => `
                <div class="item-row">
                    <div>
                        <span style="font-weight: 700; font-size: 0.95rem;">Item ID: #${item.id}</span>
                        <span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 0.75rem;">Quantity: <strong>${item.quantity}</strong></span>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Remove</button>
                </div>
            `).join('');
        }

        async function addItem(e) {
            e.preventDefault();
            const productId = document.getElementById('activeProductId').value;
            const quantity = parseInt(document.getElementById('newItemQuantity').value);

            try {
                const res = await authFetch(`${API_BASE}/products/${productId}/items`, {
                    method: 'POST',
                    body: JSON.stringify({ quantity })
                });

                if (res.success) {
                    showToast('Item added successfully', 'success');
                    document.getElementById('newItemQuantity').value = '';
                    loadItems(productId);
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to add item', 'error');
                }
            } catch (err) {
                showToast('Error adding item', 'error');
            }
        }

        async function deleteItem(itemId) {
            const productId = document.getElementById('activeProductId').value;

            try {
                const res = await authFetch(`${API_BASE}/products/${productId}/items/${itemId}`, { method: 'DELETE' });
                if (res.success) {
                    showToast('Item removed', 'success');
                    loadItems(productId);
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to remove item', 'error');
                }
            } catch (err) {
                showToast('Error removing item', 'error');
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
