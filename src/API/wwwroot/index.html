<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Core — Enterprise Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-subtle: #fff7ed;
            
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --border-focus: #f97316;
            
            --primary: #ea580c;
            --primary-hover: #c2410c;
            --primary-light: #ffedd5;
            --primary-text: #c2410c;
            
            --success: #16a34a;
            --success-light: #dcfce7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 6px;
            
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -2px rgba(15, 23, 42, 0.04);
            --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.1), 0 4px 6px -4px rgba(15, 23, 42, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .brand-accent {
            color: var(--primary);
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .role-badge {
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-admin {
            background: var(--primary-light);
            color: var(--primary-text);
            border: 1px solid #fed7aa;
        }

        .role-user {
            background: var(--success-light);
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
            border: 1px solid transparent;
            outline: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--bg-surface);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-body);
            border-color: var(--border-hover);
        }

        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
            border-color: #fca5a5;
        }

        .btn-danger:hover {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
            flex: 1;
        }

        /* Auth Screen */
        .auth-card {
            max-width: 420px;
            margin: 3rem auto;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .auth-sub {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 0.9rem;
            transition: border-color 0.15s ease;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--border-focus);
            outline: none;
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.15);
        }

        .auth-toggle {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .quick-accounts {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            box-shadow: var(--shadow-sm);
        }

        .metric-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .metric-val {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.1;
        }

        .metric-lbl {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* Controls */
        .controls-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 260px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .product-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .product-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary-text);
            background: var(--primary-light);
            padding: 0.2rem 0.5rem;
            border-radius: var(--radius-sm);
        }

        .product-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .product-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }

        .items-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
        }

        .items-list {
            max-height: 240px;
            overflow-y: auto;
            margin: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 2000;
        }

        .toast {
            padding: 0.85rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--primary); }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Navigation Header -->
    <nav class="navbar">
        <div class="brand">
            <div class="brand-icon">P</div>
            <span>Product<span class="brand-accent">Core</span></span>
        </div>
        <div class="user-nav" id="userNav">
            <!-- Populated via JS -->
        </div>
    </nav>

    <!-- App Main Container -->
    <div class="main-container">

        <!-- AUTH FORM -->
        <div id="authView" class="auth-card hidden">
            <div class="auth-header">
                <h2 class="auth-title" id="authTitle">Sign In</h2>
                <p class="auth-sub" id="authSub">Access product management portal</p>
            </div>

            <form id="authForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="authUsername" class="form-input" placeholder="e.g. admin" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="authPassword" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group hidden" id="roleGroup">
                    <label class="form-label">Role</label>
                    <select id="authRole" class="form-select">
                        <option value="Admin">Admin</option>
                        <option value="User">User</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="authSubmitBtn">Sign In</button>
            </form>

            <div class="auth-toggle">
                <span id="authToggleText">Don't have an account?</span>
                <span class="auth-link" id="authToggleLink" onclick="toggleAuthMode()">Register Now</span>
            </div>

            <div class="quick-accounts">
                <button class="btn btn-secondary btn-sm" onclick="fillQuickAuth('admin', 'AdminPassword123!')">Fill Admin Credentials</button>
            </div>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="dashboardView" class="hidden">
            
            <!-- Metric Overview -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon">📦</div>
                    <div>
                        <div class="metric-val" id="metricTotalProducts">0</div>
                        <div class="metric-lbl">Total Products</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon">🔢</div>
                    <div>
                        <div class="metric-val" id="metricTotalItems">0</div>
                        <div class="metric-lbl">Inventory Items</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon" style="background: var(--success-light); color: var(--success);">✓</div>
                    <div>
                        <div class="metric-val" style="color: var(--success); font-size: 1.15rem;">Operational</div>
                        <div class="metric-lbl">REST API Connection</div>
                    </div>
                </div>
            </div>

            <!-- Search & Actions -->
            <div class="controls-card">
                <div class="search-box">
                    <input type="text" id="searchInput" class="form-input" placeholder="Search products..." oninput="debounceSearch()">
                    <select id="sortSelect" class="form-select" style="max-width: 160px;" onchange="loadProducts()">
                        <option value="created_desc">Newest First</option>
                        <option value="name">Name (A-Z)</option>
                        <option value="name_desc">Name (Z-A)</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="openCreateProductModal()">+ Add New Product</button>
            </div>

            <!-- Product Cards -->
            <div id="productsGrid" class="products-grid">
                <!-- Populated via JS -->
            </div>

            <!-- Pagination -->
            <div class="pagination" id="paginationControls">
                <button class="btn btn-secondary btn-sm" id="prevPageBtn" onclick="changePage(-1)">← Previous</button>
                <span id="pageInfoText" style="font-size: 0.875rem; color: var(--text-muted);">Page 1</span>
                <button class="btn btn-secondary btn-sm" id="nextPageBtn" onclick="changePage(1)">Next →</button>
            </div>

        </div>

    </div>

    <!-- PRODUCT MODAL -->
    <div class="modal-backdrop" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="productModalTitle">Add Product</h3>
                <button class="modal-close" onclick="closeModal('productModal')">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label class="form-label">Product Name</label>
                    <input type="text" id="productNameInput" class="form-input" placeholder="e.g. Enterprise Server Rack" required>
                </div>
                <div style="display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ITEMS MODAL -->
    <div class="modal-backdrop" id="itemsModal">
        <div class="modal" style="max-width: 540px;">
            <div class="modal-header">
                <div>
                    <h3 class="modal-title" id="itemsModalTitle">Product Items</h3>
                    <span style="font-size: 0.85rem; color: var(--text-muted);" id="itemsModalSubtitle"></span>
                </div>
                <button class="modal-close" onclick="closeModal('itemsModal')">&times;</button>
            </div>

            <form onsubmit="addItem(event)" style="display: flex; gap: 0.75rem; margin-bottom: 1.25rem;">
                <input type="hidden" id="activeProductId">
                <input type="number" id="newItemQuantity" class="form-input" placeholder="Quantity" min="1" required>
                <button type="submit" class="btn btn-primary" style="white-space: nowrap;">+ Add Quantity</button>
            </form>

            <div class="items-list" id="itemsList"></div>
        </div>
    </div>

    <!-- TOASTS -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('jwt_token') || null;
        let currentUser = JSON.parse(localStorage.getItem('user_info') || 'null');
        let isRegistering = false;
        
        let currentPage = 1;
        let pageSize = 6;
        let totalPages = 1;
        let searchTimeout = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (token && currentUser) {
                showDashboard();
            } else {
                showAuth();
            }
        });

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function toggleAuthMode() {
            isRegistering = !isRegistering;
            document.getElementById('authTitle').innerText = isRegistering ? 'Create Account' : 'Sign In';
            document.getElementById('authSub').innerText = isRegistering ? 'Register a new account' : 'Access product management portal';
            document.getElementById('roleGroup').classList.toggle('hidden', !isRegistering);
            document.getElementById('authSubmitBtn').innerText = isRegistering ? 'Register' : 'Sign In';
            document.getElementById('authToggleText').innerText = isRegistering ? 'Already have an account?' : "Don't have an account?";
            document.getElementById('authToggleLink').innerText = isRegistering ? 'Sign In' : 'Register Now';
        }

        function fillQuickAuth(user, pass) {
            document.getElementById('authUsername').value = user;
            document.getElementById('authPassword').value = pass;
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const role = document.getElementById('authRole').value;

            const endpoint = isRegistering ? `${API_BASE}/auth/register` : `${API_BASE}/auth/login`;
            const payload = isRegistering ? { username, password, role } : { username, password };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();

                if (json.success && json.data) {
                    token = json.data.accessToken;
                    currentUser = { username: json.data.username, role: json.data.role };
                    localStorage.setItem('jwt_token', token);
                    localStorage.setItem('user_info', JSON.stringify(currentUser));
                    showToast(`Welcome ${currentUser.username}!`, 'success');
                    showDashboard();
                } else {
                    showToast(json.message || 'Authentication failed', 'error');
                }
            } catch (err) {
                showToast('Network error connecting to API', 'error');
            }
        });

        function logout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user_info');
            showToast('Logged out', 'info');
            showAuth();
        }

        function showAuth() {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('userNav').innerHTML = `<a href="/swagger" target="_blank" class="btn btn-secondary btn-sm">Swagger Docs ↗</a>`;
        }

        function showDashboard() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');

            const roleClass = currentUser.role === 'Admin' ? 'role-admin' : 'role-user';
            document.getElementById('userNav').innerHTML = `
                <span class="role-badge ${roleClass}">${currentUser.role}</span>
                <span style="font-weight: 600; font-size: 0.875rem;">${currentUser.username}</span>
                <a href="/swagger" target="_blank" class="btn btn-secondary btn-sm">Swagger ↗</a>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
            `;

            loadProducts();
        }

        async function authFetch(url, options = {}) {
            options.headers = options.headers || {};
            options.headers['Authorization'] = `Bearer ${token}`;
            options.headers['Content-Type'] = 'application/json';

            const res = await fetch(url, options);
            if (res.status === 401) {
                logout();
                throw new Error('Session expired');
            }
            return await res.json();
        }

        async function loadProducts() {
            const search = document.getElementById('searchInput').value.trim();
            const sort = document.getElementById('sortSelect').value;

            try {
                const query = `pageNumber=${currentPage}&pageSize=${pageSize}&search=${encodeURIComponent(search)}&sort=${sort}`;
                const res = await authFetch(`${API_BASE}/products?${query}`);

                if (res.success && res.data) {
                    renderProducts(res.data.items);
                    totalPages = res.data.totalPages;
                    document.getElementById('pageInfoText').innerText = `Page ${res.data.pageNumber} of ${res.data.totalPages || 1}`;
                    document.getElementById('prevPageBtn').disabled = !res.data.hasPreviousPage;
                    document.getElementById('nextPageBtn').disabled = !res.data.hasNextPage;

                    document.getElementById('metricTotalProducts').innerText = res.data.totalCount;
                    
                    let totalItemsCount = 0;
                    res.data.items.forEach(p => totalItemsCount += p.items ? p.items.length : 0);
                    document.getElementById('metricTotalItems').innerText = totalItemsCount;
                }
            } catch (err) {
                showToast('Failed to load products', 'error');
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">No products found. Click "+ Add New Product" to create one.</div>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                const itemCount = p.items ? p.items.length : 0;
                const createdDate = new Date(p.createdOn).toLocaleDateString();
                const isAdmin = currentUser.role === 'Admin';

                return `
                    <div class="product-card">
                        <div>
                            <div class="product-header">
                                <span class="product-id">#${p.id}</span>
                                <span class="items-badge">📦 ${itemCount} ${itemCount === 1 ? 'Item' : 'Items'}</span>
                            </div>
                            <h4 class="product-name">${escapeHtml(p.productName)}</h4>
                            <div class="product-meta">
                                <span>Created: ${createdDate}</span>
                            </div>
                        </div>

                        <div class="product-actions">
                            <button class="btn btn-secondary btn-sm" onclick="openItemsModal(${p.id}, '${escapeHtml(p.productName)}')">Items</button>
                            <button class="btn btn-secondary btn-sm" onclick="openEditProductModal(${p.id}, '${escapeHtml(p.productName)}')">Edit</button>
                            ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                loadProducts();
            }, 300);
        }

        function changePage(delta) {
            currentPage += delta;
            loadProducts();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openCreateProductModal() {
            document.getElementById('editProductId').value = '';
            document.getElementById('productNameInput').value = '';
            document.getElementById('productModalTitle').innerText = 'Add New Product';
            document.getElementById('productModal').classList.add('active');
        }

        function openEditProductModal(id, name) {
            document.getElementById('editProductId').value = id;
            document.getElementById('productNameInput').value = name;
            document.getElementById('productModalTitle').innerText = 'Edit Product';
            document.getElementById('productModal').classList.add('active');
        }

        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('editProductId').value;
            const productName = document.getElementById('productNameInput').value.trim();

            try {
                let res;
                if (id) {
                    res = await authFetch(`${API_BASE}/products/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify(productName)
                    });
                } else {
                    res = await authFetch(`${API_BASE}/products`, {
                        method: 'POST',
                        body: JSON.stringify({ productName })
                    });
                }

                if (res.success) {
                    showToast(res.message || 'Product saved', 'success');
                    closeModal('productModal');
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to save product', 'error');
                }
            } catch (err) {
                showToast('Error saving product', 'error');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const res = await authFetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                if (res.success) {
                    showToast('Product deleted', 'success');
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to delete product', 'error');
                }
            } catch (err) {
                showToast('Error deleting product', 'error');
            }
        }

        async function openItemsModal(productId, productName) {
            document.getElementById('activeProductId').value = productId;
            document.getElementById('itemsModalTitle').innerText = productName;
            document.getElementById('itemsModalSubtitle').innerText = `Product ID #${productId}`;
            document.getElementById('itemsModal').classList.add('active');
            loadItems(productId);
        }

        async function loadItems(productId) {
            const list = document.getElementById('itemsList');
            list.innerHTML = `<div style="text-align: center; color: var(--text-muted);">Loading items...</div>`;

            try {
                const res = await authFetch(`${API_BASE}/products/${productId}/items`);
                if (res.success && res.data) {
                    renderItems(res.data);
                }
            } catch (err) {
                list.innerHTML = `<div style="color: var(--danger);">Failed to load items.</div>`;
            }
        }

        function renderItems(items) {
            const list = document.getElementById('itemsList');
            if (!items || items.length === 0) {
                list.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 1.5rem;">No items attached.</div>`;
                return;
            }

            list.innerHTML = items.map(item => `
                <div class="item-row">
                    <div>
                        <span style="font-weight: 700; font-size: 0.9rem;">Item #${item.id}</span>
                        <span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 0.75rem;">Quantity: <strong>${item.quantity}</strong></span>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Remove</button>
                </div>
            `).join('');
        }

        async function addItem(e) {
            e.preventDefault();
            const productId = document.getElementById('activeProductId').value;
            const quantity = parseInt(document.getElementById('newItemQuantity').value);

            try {
                const res = await authFetch(`${API_BASE}/products/${productId}/items`, {
                    method: 'POST',
                    body: JSON.stringify({ quantity })
                });

                if (res.success) {
                    showToast('Item added', 'success');
                    document.getElementById('newItemQuantity').value = '';
                    loadItems(productId);
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to add item', 'error');
                }
            } catch (err) {
                showToast('Error adding item', 'error');
            }
        }

        async function deleteItem(itemId) {
            const productId = document.getElementById('activeProductId').value;

            try {
                const res = await authFetch(`${API_BASE}/products/${productId}/items/${itemId}`, { method: 'DELETE' });
                if (res.success) {
                    showToast('Item removed', 'success');
                    loadItems(productId);
                    loadProducts();
                } else {
                    showToast(res.message || 'Failed to remove item', 'error');
                }
            } catch (err) {
                showToast('Error removing item', 'error');
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
